repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-commit-scope
        name: "Check: no unrelated modules in one commit"
        entry: python3 scripts/check_commit_scope.py
        language: system
        always_run: true
        pass_filenames: false

      - id: check-commit-msg
        name: "Check: Conventional Commits format"
        entry: python3 scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]
        always_run: true
